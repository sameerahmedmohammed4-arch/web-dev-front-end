

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ExpenseTracker.css">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
<h1> <i class="fa-solid fa-wallet"></i> Expense Tracker</h1>
  <div class="main">
    <div class="details">
        <label for="expenseName">Expense Name</label>
        <input type="text" id="expenseName" placeholder="Enter expense name" required>
    </div>
    <div class="details">
        <label for="amount">Amount</label>
        <input type="number" id="amount" placeholder="Enter Amount" required>
    </div>
    <div class="details">
        <label for="category">Category</label>
        <select id="category" required>
            <option value="">Select Category</option>
            <option value="Clothes">Clothes </option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Grocery" >Grocery</option>
            <option value="Income" >Income</option>
        </select>
    </div>
    <div class="details">
        <label>Date</label>
        <input id="date" type="date" required>
    </div>
    <div class="details">
        <button  type="submit" id="btn">Add Expense</button>
    </div>
  </div>

<div class="container">
  <div class="total">
    <div class="icon">
        <i class="fa-solid fa-wallet"></i>
    </div>
    <div class="total-names">
        <label for="Total Expenses">Total Expenses</label>
        <span class="price" id="totalExpenses">0</span>
    </div>
  </div>
  <div class="total">
    <div class="icon">
        <i class="fa-solid fa-arrow-trend-up" style="color: darkgreen;"></i>
    </div>
    <div class="total-names">
        <label for="Total Income" >Total Income</label>
        <span class="price"  style="color: darkgreen;"  id="totalIncome">0</span>
    </div>
  </div><div class="total">
    <div class="icon">
        <i class="fa-solid fa-scale-balanced" ></i>
    </div>
    <div class="total-names">
        <label for="Balance">Balance</label>
        <span class="price" id="balance">0</span>
    </div>
   </div>
  </div>
  
  <div class="main-container">

   <table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Date</th>
            <!-- <th>Actions</th> -->
        </tr>
    </thead>

    <tbody id="expenseList">

    </tbody>
</table>

</div>

  <script src="ExpenseTracker.js"></script>
</body>
</html>
