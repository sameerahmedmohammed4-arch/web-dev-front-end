<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Animation</title>
  <link rel="stylesheet" href="bday.css">
</head>
<body>
  <div class="container">
  <h1 class="message">🎂 Happy Birthday 🎉</h1>
  <canvas id="confetti"></canvas>
  <div class="balloons">
    <div class="balloon red"></div>
    <div class="balloon blue"></div>
    <div class="balloon green"></div>
    <div class="balloon yellow"></div>
  </div>
  <audio id="birthdaySong" autoplay loop>
    <source src="birthday.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <!-- Birthday Cake -->
  <img src="cake.png" alt="Birthday Cake" class="cake">
</div>

  <script src="bday.js"></script>
</body>
</html>
